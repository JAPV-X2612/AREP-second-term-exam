<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Services</title>
</head>
<body>
<h1>Math Services</h1>

<h2>Catalan Sequence</h2>
<label for="catalanValue">Value of n (non-negative integer):</label>
<input type="number" id="catalanValue" min="0" value="10">
<button onclick="compute()">Compute</button>

<div id="catalanResult"></div>

<script>
    function compute() {
        const value = document.getElementById("catalanValue").value;
        const xhttp = new XMLHttpRequest();
        xhttp.onload = function() {
            const data = JSON.parse(this.responseText);
            document.getElementById("catalanResult").innerHTML =
                "<p><strong>Operation:</strong> " + data.operation + "</p>" +
                "<p><strong>Input:</strong> " + data.input + "</p>" +
                "<p><strong>Output:</strong> " + data.output + "</p>";
        };
        xhttp.onerror = function() {
            document.getElementById("catalanResult").innerHTML =
                "<p>Error connecting to service</p>";
        };
        xhttp.open("GET", "/proxy/catalan?value=" + value);
        xhttp.send();
    }
</script>
</body>
</html>
